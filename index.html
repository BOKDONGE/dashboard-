<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e40af,#7c3aed);padding:16px;text-align:center}
.header h1{font-size:1.1rem;font-weight:700;color:#fff}
.nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:8px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1rem;width:32px;height:32px;border-radius:50%;cursor:pointer;transition:background .2s}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,.3)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-date{font-size:.95rem;font-weight:600;color:#fff;min-width:80px;text-align:center}
.uptime{font-size:.7rem;color:#bfdbfe;margin-top:4px}
.cards{padding:12px;display:flex;flex-direction:column;gap:10px}
.card{background:#1e293b;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.card-header{padding:12px 14px 8px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.card-icon{font-size:1.2rem}
.card-title{font-size:.9rem;font-weight:600;color:#f1f5f9;flex:1}
.toggle{font-size:.8rem;color:#94a3b8;transition:transform .2s}
.card-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .2s}
.card-body.open{max-height:3000px;padding:0 14px 14px}
.card-body p{font-size:.82rem;line-height:1.7;color:#cbd5e1;white-space:pre-wrap;word-break:break-word}
.msg{text-align:center;padding:40px;color:#64748b;font-size:.85rem}
.footer{text-align:center;padding:14px;color:#475569;font-size:.72rem}
</style>
</head>
<body>
<div class="header">
  <h1>📱 Daily Dashboard</h1>
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="changeDate(-1)">◀</button>
    <span class="nav-date" id="dateLabel"></span>
    <button class="nav-btn" id="nextBtn" onclick="changeDate(1)" disabled>▶</button>
  </div>
  <div class="uptime" id="uptime"></div>
</div>
<div class="cards" id="cards"></div>
<div class="footer">카드를 탭하면 펼쳐집니다</div>
<script>
const D={"portfolio":"📊 포트폴리오 일일 브리핑 — 2026-06-30\n\n🔑 오늘의 핵심\n6/29 코스피 910포인트 급락. 삼성전자(-5.23%)·SK하이닉스(-1.35%) 약세, 방산(현대로템 +6.81%)·KO·O 견조.\n\n📈 국내 주식\n・ SK하이닉스: 2,637,000원 ▼1.35%\n・ 삼성전자: 321,750원 ▼5.23%\n・ 현대차: 약 500,000원 ▲4.06%\n・ 현대로템: 227,500원 ▲6.81%\n・ 한미반도체: 261,000원 ▲1.36%\n\n🌏 해외 주식/ETF\n・ 엔비디아(NVDA): $192.71 ▲0.09%\n・ SMH: $626.42 ▲2.42%\n・ 코카콜라(KO): $82.63 ▲2.75%\n・ 리얼티인컴(O): $63.04 ▲1.61%\n\n🎯 오늘의 액션\n🔴 삼성전자/SK하이닉스: 추격 매도 자제\n🔴 나이키(NKE): 실적 발표 전 포지션 점검\n🟡 현대로템: 차익 실현 검토\n🟢 KO·O: 배당·방어 비중 유지","stock":"📈 주식 참고 뉴스 — 2026-06-30\n\n1. SpaceX IPO — 주가 +50%, 시총 $2.8조\n2. 연준 금리 동결, 추가 인상 가능성 (3.5~3.75%)\n3. Micron Q3 매출 $41.5B(YoY +346%), HBM4 완판\n4. OpenAI·Anthropic IPO 기밀 신청\n5. 이재명 정부 1000조 첨단산업 투자 발표\n6. OpenAI 자체 칩 할라페뇨 — 삼성·SK 메모리 탑재\n7. 미중 관세 협상 기한 도달, 합의 미도달\n8. 삼성전자 HBM4 양산·AMD 주공급사 지정\n9. TSMC 7나노 이하 가격 5~10% 인상\n10. WTI $69대·코스피 8,800선·기준금리 2.5% 동결","fortune":"🔮 오늘의 일진 — 2026-06-30 (화) 을해(乙亥)일\n\n총운 ★★★★\n\n천간 을목(乙木) = 비견(比肩) — 동료·자립\n지지 해수(亥水) = 정인(正印) — 배움·후원\n인해합목으로 힘이 한 방향으로 모이는 날.\n\n💰 재물: 정보·신뢰·관계가 씨앗. 배움에 투자.\n💼 직장: 협업·멘토링에 강함. 동료와 나누면 풀림.\n❤️ 관계: 오래 연락 못 한 사람에게 안부.\n🏃 건강: 하체 따뜻하게, 가벼운 스트레칭.\n\n🍀 손 내밀면 받쳐줄 사람이 옵니다.\n행운: 오전 9~11시 | 청록·검정 | 동쪽·북쪽","history":"📜 오늘의 역사 — 2026-06-30\n\n유로코뮤니즘의 균열 — 동베를린 유럽 공산당 대회 (1976)\n\n1976년 6월 29~30일, 동베를린에서 유럽 29개 공산·노동자당이 모였다. 이탈리아·프랑스·스페인 공산당은 소련 노선을 거부하고 자율적 노선 결정 권리를 선언.\n\n💡 획일적 지시보다 다양성을 수용하는 구조가 오래 살아남는다.\n\n---\n💡 오늘의 지식: 사법심사(Judicial Review)\n1803년 Marbury v. Madison 판결로 확립. 선거로 뽑힌 의회도 헌법 앞에서 패소할 수 있다.","goodtext":"✨ 오늘의 글귀 — 용기\n\n진정한 용사는 참담한 인생을 똑바로 마주할 용기가 있고,\n뚝뚝 떨어지는 선혈을 똑바로 바라볼 용기가 있다.\n\n— 루쉰(魯迅, 1881~1936)\n\n真的猛士，敢于直面惨淡的人生，敢于正视淋漓的鲜血。\n\n💭 용기는 두려움이 없는 것이 아니라, 외면하고 싶은 것을 똑바로 바라보는 힘입니다.","thai":"🇹🇭 오늘의 태국어 — 2026-06-30\n\n🟢 초급: ลดราคาได้ไหมคะ\n발음: 롯 라카 다이 마이 카\n뜻: 가격 좀 깎아 주실 수 있나요?\n\n🟡 중급: ผมอยากไปตลาดเพราะอยากซื้อผลไม้\n발음: 폼 약 빠이 딸랏 프로 약 쓰 폰라마이\n뜻: 저는 과일을 사고 싶어서 시장에 가고 싶어요.\n\n🔴 고급: ขอโทษที่รบกวนนะคะ ไม่ทราบว่าพอจะช่วยแนะนำร้านอาหารอร่อยๆ แถวนี้ได้ไหมคะ\n발음: 커톳 티 롭꾸안 나카 마이 쌉 와 퍼짜 추아이 내남 란아한 아로이아로이 태우니 다이 마이 카\n뜻: 실례지만, 이 근처 맛있는 식당 추천해 주실 수 있을까요?\n\n💡 끝의 ครับ(남성)/คะ(여성) 절대 빠뜨리지 마세요!","story":"📖 오늘의 단편소설\n\n표류(A la deriva) — 오라시오 키로가 (1912)\n\n✍️ 라틴아메리카 단편소설의 선구자.\n\n📜 줄거리 (스포일러)\n파울리노가 밀림에서 독사에 물린다. 홀로 카누를 타고 파라나 강에서 도움을 찾는다. 강변 친구에게 절규하지만 침묵만 돌아온다. 해질 무렵 통증이 사라지며 살 것 같은 느낌이 든다.\n\n목요일이었지……\n\n그리고 숨이 멈춘다. 그 쾌감은 죽음 직전 신체가 보내는 마지막 거짓 신호였다.\n\n💡 죽음 직전 거짓 회복감이 핵심 아이러니."};
const TODAY='2026-06-30';
const TODAY_UPD='06/30 00:06';
let cur=TODAY;
const META=[
  {k:'portfolio',i:'📈',t:'포트폴리오 브리핑'},
  {k:'stock',i:'📰',t:'주식 뉴스 브리핑'},
  {k:'fortune',i:'🔮',t:'오늘의 운세'},
  {k:'history',i:'📚',t:'오늘의 역사'},
  {k:'goodtext',i:'✨',t:'오늘의 글귀'},
  {k:'thai',i:'🇹🇭',t:'오늘의 태국어'},
  {k:'story',i:'📖',t:'오늘의 단편소설'},
];
function fmt(d){return d.slice(5).replace('-','/')}
function render(data,upd){
  const c=document.getElementById('cards');c.innerHTML='';
  document.getElementById('uptime').textContent=upd?'업데이트: '+upd:'';
  META.forEach((m,i)=>{
    const v=(data[m.k]||'데이터 없음');
    const el=document.createElement('div');el.className='card';
    el.innerHTML='<div class="card-header" onclick="tog(this)"><span class="card-icon">'+m.i+'</span><span class="card-title">'+m.t+'</span><span class="toggle">▼</span></div><div class="card-body '+(i===0?'open':'')+'"><p>'+v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p></div>';
    c.appendChild(el);
  });
}
async function load(date){
  cur=date;
  document.getElementById('dateLabel').textContent=fmt(date);
  document.getElementById('nextBtn').disabled=date>=TODAY;
  if(date===TODAY){render(D,TODAY_UPD);return;}
  document.getElementById('cards').innerHTML='<div class="msg">불러오는 중...</div>';
  try{
    const r=await fetch('./data/'+date+'.json');
    if(r.ok){const d=await r.json();render(d.tasks,d.updated_at);}
    else document.getElementById('cards').innerHTML='<div class="msg">'+fmt(date)+' 데이터 없음</div>';
  }catch{document.getElementById('cards').innerHTML='<div class="msg">불러오기 실패</div>';}
}
function changeDate(n){const d=new Date(cur);d.setDate(d.getDate()+n);load(d.toISOString().split('T')[0]);}
function tog(h){const b=h.nextElementSibling,t=h.querySelector('.toggle');b.classList.toggle('open');t.style.transform=b.classList.contains('open')?'rotate(180deg)':'';}
load(TODAY);
</script>
</body>
</html>
