<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Dashboard</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; font-size: 18px; line-height: 1.95; }
  .header { background: linear-gradient(135deg, #1a2f4e 0%, #2a5298 100%); color: white; padding: 14px 16px 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header-top h1 { font-size: 17px; font-weight: 700; }
  .date-nav { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  #date-label { font-size: 13px; font-weight: 600; white-space: nowrap; flex: 1; }
  .date-nav button { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 8px; padding: 4px 12px; font-size: 18px; cursor: pointer; line-height: 1; flex-shrink: 0; }
  .date-nav button:disabled { opacity: 0.3; cursor: default; }
  #today-btn { font-size: 11px; padding: 3px 8px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; color: white; cursor: pointer; flex-shrink: 0; }
  .tabs-wrap { background: white; border-bottom: 1px solid #e0e0e0; overflow-x: auto; scrollbar-width: none; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs { display: flex; padding: 10px 12px 0; gap: 4px; min-width: max-content; }
  .tab { padding: 7px 13px 9px; border-radius: 10px 10px 0 0; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; border-bottom: none; color: #777; background: #f5f5f5; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .tab.active { background: white; color: #1a2f4e; border-color: #ddd; font-weight: 700; border-bottom: 2px solid white; margin-bottom: -1px; }
  .tab .badge { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .tab .badge.ok { background: #34c759; }
  .panels { padding: 12px 14px 30px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .card { background: white; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden; }
  .card-head { padding: 14px 16px 10px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }
  .card-emoji { font-size: 26px; }
  .card-title { font-size: 15px; font-weight: 700; color: #1a2f4e; }
  .card-time { font-size: 11px; color: #aaa; margin-top: 2px; }
  .card-body { padding: 14px 16px; font-size: 17px; line-height: 1.95; color: #2c2c2c; max-height: calc(100vh - 220px); overflow-y: auto; -webkit-overflow-scrolling: touch; word-break: break-word; }
  .card-body h1 { font-size: 17px; font-weight: 800; color: #1a2f4e; margin: 16px 0 6px; }
  .card-body h2 { font-size: 16px; font-weight: 700; color: #1a2f4e; margin: 14px 0 5px; }
  .card-body h3 { font-size: 15px; font-weight: 700; color: #2a5298; margin: 12px 0 4px; }
  .card-body strong { font-weight: 700; }
  .card-body em { font-style: italic; color: #555; }
  .card-body hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .card-body blockquote { border-left: 3px solid #2a5298; margin: 8px 0; padding: 4px 12px; color: #555; font-style: italic; background: #f8f9ff; border-radius: 0 6px 6px 0; }
  .card-body code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }
  .card-body table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .card-body th { background: #1a2f4e; color: white; padding: 6px 8px; text-align: left; }
  .card-body td { padding: 5px 8px; border-bottom: 1px solid #eee; }
  .card-body tr:nth-child(even) td { background: #f9f9f9; }
  .empty { text-align: center; padding: 40px 20px; color: #bbb; }
  .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
  .status { font-size: 11px; color: #bbb; text-align: center; padding: 10px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <h1>🗓️ Daily Dashboard</h1>
    <button id="today-btn" onclick="goToday()">오늘</button>
  </div>
  <div class="date-nav">
    <div id="date-label">로딩 중...</div>
    <button id="btn-prev" onclick="movDate(1)">‹</button>
    <button id="btn-next" onclick="movDate(-1)">›</button>
  </div>
</div>
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="panels" id="panels"></div>
<div class="status" id="status"></div>

<script>
const TASKS = [
  {key:"portfolio", emoji:"📈", label:"포트폴리오"},
  {key:"stock",     emoji:"📰", label:"주식뉴스"},
  {key:"fortune",   emoji:"🔮", label:"운세"},
  {key:"history",   emoji:"📜", label:"역사"},
  {key:"goodtext",  emoji:"✨", label:"글귀"},
  {key:"thai",      emoji:"🇹🇭", label:"태국어"},
  {key:"story",     emoji:"📚", label:"단편소설"},
];

let dates = [], currentIdx = 0, activeTab = TASKS[0].key, cache = {};

const BASE = (function() {
  var p = location.pathname;
  return p.endsWith('/') ? p : p + '/';
})();

function fmtDate(str) {
  var d = new Date(str + 'T00:00:00');
  var days = ['일','월','화','수','목','금','토'];
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
}

async function init() {
  try {
    var r = await fetch(BASE + 'data/index.json?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    dates = await r.json();
    currentIdx = 0;
    await loadDate(0);
  } catch(e) {
    document.getElementById('panels').innerHTML = '<div class="loading">❌ ' + e.message + '</div>';
  }
}

async function loadDate(idx) {
  var dateStr = dates[idx];
  document.getElementById('date-label').textContent = fmtDate(dateStr);
  document.getElementById('btn-prev').disabled = (idx >= dates.length - 1);
  document.getElementById('btn-next').disabled = (idx <= 0);
  document.getElementById('today-btn').style.display = idx === 0 ? 'none' : '';
  if (!cache[dateStr]) {
    document.getElementById('panels').innerHTML = '<div class="loading">⏳ 불러오는 중...</div>';
    var r2 = await fetch(BASE + 'data/' + dateStr + '.json?v=' + Date.now());
    if (!r2.ok) throw new Error('HTTP ' + r2.status);
    cache[dateStr] = await r2.json();
  }
  render(cache[dateStr]);
  document.getElementById('status').textContent = '총 ' + dates.length + '일치 데이터';
}

function movDate(dir) {
  var next = currentIdx + dir;
  if (next < 0 || next >= dates.length) return;
  currentIdx = next;
  loadDate(currentIdx);
}
function goToday() { currentIdx = 0; loadDate(0); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineHtml(e) {
  return e.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
}
function mdLine(s) {
  if (/^> (.+)$/.test(s)) return '<blockquote>' + inlineHtml(esc(s.replace(/^> /,''))) + '</blockquote>';
  var e = esc(s);
  if (/^---+$/.test(e)) return '<hr>';
  if (/^### (.+)$/.test(e)) return '<h3>' + inlineHtml(e.slice(4)) + '</h3>';
  if (/^## (.+)$/.test(e))  return '<h2>' + inlineHtml(e.slice(3)) + '</h2>';
  if (/^# (.+)$/.test(e))   return '<h1>' + inlineHtml(e.slice(2)) + '</h1>';
  return inlineHtml(e);
}
function renderTable(rows) {
  var cells = rows.map(function(r){ return r.split('|').slice(1,-1).map(function(c){ return c.trim(); }); });
  if (cells.length < 2) return rows.map(esc).join('<br>');
  var html = '<table><tr>';
  cells[0].forEach(function(h){ html += '<th>' + esc(h) + '</th>'; });
  html += '</tr>';
  for (var i = 2; i < cells.length; i++) {
    html += '<tr>';
    cells[i].forEach(function(c){
      var ec = esc(c), style = '';
      if (ec.indexOf('▲') >= 0) style = 'color:#d0021b;font-weight:600';
      else if (ec.indexOf('▼') >= 0) style = 'color:#0050b3;font-weight:600';
      html += '<td' + (style ? ' style="'+style+'"' : '') + '>' + ec + '</td>';
    });
    html += '</tr>';
  }
  return html + '</table>';
}
function mdToHtml(text) {
  if (!text) return '';
  var lines = text.split('\n'), out = [], inTable = false, tableRows = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (/^\|.+\|/.test(line)) {
      if (!inTable) { inTable = true; tableRows = []; }
      tableRows.push(line);
    } else {
      if (inTable) { out.push(renderTable(tableRows)); tableRows = []; inTable = false; }
      out.push(mdLine(line));
    }
  }
  if (inTable) out.push(renderTable(tableRows));
  return out.join('<br>');
}
function render(dayData) {
  var data = dayData.tasks || {};
  document.getElementById('tabs').innerHTML = TASKS.map(function(t){
    var d = data[t.key];
    return '<div class="tab ' + (t.key===activeTab?'active':'') + '" data-key="' + t.key + '"><span class="badge ' + (d?'ok':'') + '"></span>' + t.emoji + ' ' + t.label + '</div>';
  }).join('');
  document.querySelectorAll('.tab').forEach(function(el){
    el.addEventListener('click', function(){ switchTab(el.dataset.key); });
  });
  document.getElementById('panels').innerHTML = TASKS.map(function(t){
    var d = data[t.key];
    var inner = d
      ? '<div class="card"><div class="card-head"><div class="card-emoji">' + t.emoji + '</div><div><div class="card-title">' + t.label + '</div><div class="card-time">업데이트: ' + d.updated_at + '</div></div></div><div class="card-body">' + mdToHtml(d.content) + '</div></div>'
      : '<div class="empty"><div style="font-size:40px;margin-bottom:10px">⏳</div><p style="font-size:14px">데이터 없음</p></div>';
    return '<div class="panel ' + (t.key===activeTab?'active':'') + '" id="panel-' + t.key + '">' + inner + '</div>';
  }).join('');
}
function switchTab(key) {
  activeTab = key;
  document.querySelectorAll('.tab').forEach(function(el){ el.classList.toggle('active', el.dataset.key===key); });
  document.querySelectorAll('.panel').forEach(function(el){ el.classList.toggle('active', el.id==='panel-'+key); });
}

init();
</script>
</body>
</html>
