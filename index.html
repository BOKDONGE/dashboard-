6/23)* | 미확인 |\n| 얼라이트 (ALIT) | $0.95 *(06/24)* | ▲ 0.82% |\n\n*참고: 얼라이트(ALIT)는 6/30자 20:1 액면병합 예정.*\n\n## 📰 주요 뉴스 (상위 변동 종목)\n\n### 한미반도체 (042700)\n1년간 약 500% 상승, HBM 본딩장비 수혜 지속 — 증권가 추가 상승 여력 제기. 단 최근 외국인·기관 수급 엇갈림 주의.\n\n### SK하이닉스 (000660)\n사상 첫 코스피 시총 1위 등극 직후 급락 — HBM 가격 조정 우려·삼성전자 HBM4 추격·외국인 순매도 집중. BNK투자증권, 투자의견 '매수→보유' 하향.\n\n### 삼성전자 (005930)\n2026년 1분기 전체 D램 시장 1위 탈환, HBM4로 추격 — 시총 1위 경쟁 부각.\n\n### 뉴스케일파워 (SMR)\n최근 거래일 13.5% 급등, 주간 20%+. Mirion 산하 Paragon과 HIPS 안전계통 최종설계 계약. 전 NRC 위원장 Dale Klein 이사회 합류, TVA 최대 6GW·루마니아 RoPower 진행 — AI 데이터센터 전력수요發 원전 테마 강세.\n\n### 레드와이어 (RDW)\n우주·방산 섹터 변동성 속 6/24 약 5.6% 하락.\n\n## 🎯 오늘의 액션\n| 우선순위 | 종목 | 액션 | 근거 |\n|:---:|---|---|---|\n| 🔴 | SK하이닉스 (000660) | 급락 후 변동성 점검·분할 대응 검토 | 시총 1위 직후 급락, 투자의견 하향 |\n| 🔴 | 전 종목 가격 | 네이버/증권사 앱에서 6/25 종가 직접 재확인 | Chrome 미연결로 일부 시세 미검증 |\n| 🟡 | 한미반도체 (042700) | 단기 급등 차익실현 vs 수급 확인 | 외국인·기관 수급 엇갈림 |\n| 🟡 | 뉴스케일파워 (SMR) | 원전 테마 모멘텀 점검 | 안전계통 계약·이사회 보강 후 급등, $14 저항 주시 |\n| 🟢 | 배당 ETF (SCHD, O, JEPQ) | 보유 유지 | 안정적 인컴·변동성 헤지 |"}, "stock": {"updated_at": "06/25 오전", "content": "## 📈 주식 참고 뉴스 — 2026-06-25 (목요일)\n\n### 1. 마이크론 Q3 FY2026 역대 최대 실적 + Q4 가이던스 $50B 폭탄\n**분야:** IT·AI · **지역:** 해외\n\n마이크론이 6월 24일 장 마감 후 발표한 회계연도 Q3 실적은 매출 $414.6억(예상 $355.9억, YoY +346%), EPS $25.11(예상 $20.20)로 전망치를 대폭 상회하며 역대 최대 분기를 기록했다. Q4 가이던스로 매출 $500억(±$10억, 예상 $429억)을 제시해 장 후 주가 +15% 급등했다. AI 데이터센터용 HBM(고대역폭 메모리) 수요 폭발이 핵심 동력이며, SK하이닉스·삼성전자 주가에도 직접 영향을 준다.\n\n### 2. SK하이닉스 나스닥 ADR $29B 상장 추진 — 역대 최대 한국 기업 미국 상장\n**분야:** IT·AI · **지역:** 국내\n\nSK하이닉스가 나스닥에 미국예탁증서(ADR)를 발행해 최대 $294억(약 45.5조 원)을 조달하는 계획을 발표했다. 7월 10일 거래 시작 예정이며, BofA·씨티그룹·골드만삭스·JP모건이 주관한다. 완료 시 알리바바의 2014년 $250억 IPO를 넘어 ADR 역사상 최대 규모가 된다. SK하이닉스는 HBM 시장 점유율 약 60%를 보유하며 AI 수혜 대장주로 꼽힌다.\n\n### 3. 코스피 서킷브레이커 발동 (-9.99%) 후 급반전\n**분야:** 거시·정책 · **지역:** 국내\n\n6월 23일 코스피가 장중 9.99% 폭락하며 서킷브레이커(20분 매매 중단)가 발동되고 외국인 자금 $25억이 단 하루 만에 이탈했다. 이후 6월 24일 마이크론 실적 기대와 국내 명목 성장률 50년 만에 최고치 소식에 힘입어 급반전했다. 급락 원인은 MSCI 탈락 + AI 수익성 우려 + 레버리지 ETF 강제청산이 복합적으로 작용했다.\n\n### 4. MSCI, 한국 선진국 지수 편입 또 불발 — 원화 태환성·외환시장 접근성 문제\n**분야:** 거시·정책 · **지역:** 국내\n\nMSCI는 6월 연례 검토에서 한국을 이머징 마켓에 유지하며 선진국 관찰대상 목록 등재를 또다시 거부했다. 이유: 원화 오프쇼어 태환성 제한, 외환시장 접근성, 공매도 규제, 옴니버스 계좌 문제. 한국 정부는 7월부터 24시간 원화 거래 시작 등 개선 추진 중. 외국인 패시브 자금 유입 기대 소멸이 코스피 급락의 핵심 도화선이 됐다.\n\n### 5. 연준(Fed) 4회 연속 금리 동결 + BofA, 연내 3회 인상 예고\n**분야:** 거시·정책 · **지역:** 해외\n\n6월 17일 케빈 워시 신임 연준 의장 첫 FOMC에서 기준금리 3.50~3.75%가 만장일치(12-0)로 동결됐다. 그러나 18명 위원 중 9명이 연내 추가 인상 지지하며 분위기는 매파로 급선회했다. Bank of America는 연내 3회 금리 인상을 전망해 글로벌 채권·주식시장에 충격을 줬다. 달러 강세와 한국 원화 약세 압력 동반 상승 중.\n\n### 6. 글로벌 AI 투자 수익성 논쟁 격화 — 빅테크 $400B 투자 vs 이익률 우려\n**분야:** IT·AI · **지역:** 해외\n\n알파벳·아마존·마이크로소프트·메타 등 빅테크가 2026년 데이터센터에 약 $4,000억을 쏟아붓는 가운데, 월가에서는 AI 인프라 투자 대비 이익률 둔화·AI 모델 가격경쟁 심화에 따른 수익성 우려가 제기되고 있다. 이 논쟁은 지난 이틀간 나스닥·반도체 지수 급락의 직접적인 방아쇠가 됐다.\n\n### 7. 나스닥 이틀 연속 하락, 필라델피아 반도체 지수(SOXX) -7.88% 급락 후 반등\n**분야:** 거시·정책 · **지역:** 해외\n\n6월 23일 AI 수익성 우려와 KOSPI 서킷브레이커 충격이 겹치며 나스닥 -2.2%, SOXX -7.88%의 기술주 동반 급락이 연출됐다. 6월 24일에도 나스닥(-0.43%), S&P500(-0.10%)이 소폭 하락 마감(각각 25,476 및 7,358)했다. 마이크론 실적 발표 후 6월 25일(목) 프리마켓에서 반도체주가 전반적으로 반등 중.\n\n### 8. 엔비디아, Vera Rubin AI 팩토리 플랫폼 발표 — AI 인프라 구조 재편\n**분야:** IT·AI · **지역:** 해외\n\n엔비디아가 'Vera Rubin' 플랫폼을 발표했다. AI 팩토리의 개념을 재정의하는 POD 규모 AI 인프라로, 제조·클라우드·인프라 파트너를 위해 설계됐다. TOP500 슈퍼컴퓨터 중 81%가 엔비디아 기술을 탑재하며 점유율을 높이고 있으며, 유럽에서는 35개 AI HPC 슈퍼컴퓨터 개발이 진행 중이다.\n\n### 9. 중동 이란-미국 교전 완화 + 호르무즈 해협 재개통 — 유가 $106/배럴 유지\n**분야:** 국제정세 · **지역:** 해외\n\n미국과 이란이 종전을 위한 중간 합의를 발표하며 호르무즈 해협 봉쇄가 점진적으로 완화되고 있다. 그러나 전 세계 공급이 2026년 연간 390만 bpd 감소 전망이고, 걸프 산유량 1,050만 bpd가 아직 오프라인 상태로 브렌트유는 $106/배럴 수준을 유지하고 있다.\n\n### 10. 미-중 무역관세 30% 유지 + 반도체·희토류 핵심 쟁점 — 60일 휴전 종료 임박\n**분야:** 국제정세 · **지역:** 해외\n\n6월 11일 미-중이 30% 관세를 유지하기로 합의하며 60일 휴전에 들어갔다. 그러나 반도체 수출 규제 및 희토류 공급망 문제는 합의에서 빠진 핵심 쟁점. 트럼프 행정부는 추가 Section 301 조사를 통해 12.5%의 새 관세를 추진 중. 알리바바·바이두·BYD가 미국 국방부 중국군 기업 목록에 추가되는 등 기술 디커플링도 지속되고 있다.\n\n### 11. 삼성전자, 코스피 급락 속 주가 12%대 하락 — 반도체 실적 경쟁 구도 심화\n**분야:** IT·AI · **지역:** 국내\n\n삼성전자(005930)가 6월 23일 기준 310,000원으로 이전 종가(353,500원) 대비 약 12% 급락했다. MSCI 탈락과 AI 투자 수익성 우려, 외국인 매도가 맞물렸다. SK하이닉스가 HBM 시장 점유율 60%를 차지하는 가운데 삼성전자의 HBM3E 대량공급 진입이 여전히 과제로 남아 있어 실적 전망 눈높이 조정이 불가피하다.\n\n### 12. 테슬라 옵티머스 연 100만 대 생산 체계 구축 + OpenAI 로보틱스 경쟁 돌입\n**분야:** 산업·기업 · **지역:** 해외\n\n테슬라가 프리몬트 공장 모델S/X 라인을 옵티머스 전용 조립 라인으로 전환하며 7~8월 완공 후 연간 100만 대 규모로 증설할 계획이다. 동시에 OpenAI가 로보틱스 부문에 진출하며 테슬라 옵티머스에 대한 직접적인 경쟁자로 부상했다. 일론 머스크는 grok이 테슬라 FSD에 음성 명령을 내리는 기능이 약 3개월 내 출시된다고 밝혔다.\n\n### 13. SpaceX, 나스닥 IPO 추진 — $750억 역대 최대 IPO, 기업가치 $1.75~2조\n**분야:** 산업·기업 · **지역:** 해외\n\nSpaceX가 나스닥에 티커 'SPCX'로 상장을 추진하며 $750억 조달, 기업가치 $1.75~2조 달러를 목표로 하고 있다. 테슬라가 Q1 보고서에 SpaceX 지분 $20억을 공시했고, 두 회사가 텍사스에 칩 제조공장(테라팹)을 공동 건설 중이다.\n\n### 14. 우라늄·원전 시장 강세 — 우라늄 가격 $85/파운드+, Urenco 50% 증설\n**분야:** 산업·기업 · **지역:** 해외\n\nAI 데이터센터 전력 수요 급증을 배경으로 원자력 에너지에 대한 수요가 폭발하고 있다. 우라늄 장기계약 가격이 $85/파운드를 상회하며 구조적 상승 국면에 접어들었고, Urenco가 미국 농축시설 용량을 50% 확대한다고 발표했다. 버스타인은 카메코(CCJ)와 카자톰프롬을 최선호 종목으로 제시했다.\n\n### 15. 한국 명목 GDP 성장률 50년 만에 최고치 — 반도체 수출이 성장 견인\n**분야:** 거시·정책 · **지역:** 국내\n\n한국의 명목 GDP 성장률이 50년 만에 최고치를 기록했다고 발표됐다. 반도체 수출 호조가 성장을 견인한 것으로 분석되며, 코스피 급락 속에서도 실물 경제 기초 체력은 강하다는 평가가 나왔다.\n\n---\n*이슈/파급력 순 참고용 정보. 특정 종목 매수·매도 권유 아님. 투자 판단·책임은 본인에게 있습니다.*"}, "fortune": {"updated_at": "06/25 오전", "content": "## 🔮 오늘의 일진\n\n> # **경오(庚午)일** — 2026-06-25 (목)\n\n오늘은 천간에 경금(庚金)이 떠 있는 날입니다. 을목(乙木) 일간에게 경금은 **정관(正官)** — 책임·규율·공적인 질서를 뜻하는 기운입니다. 게다가 을목과 경금은 서로 끌어당기는 **을경합(乙庚合)** 관계라, 오늘은 \"마땅히 해야 할 일\"과 \"약속·책임\"이 자연스럽게 나에게 들러붙는 하루입니다. 지지의 오화(午火)는 을목이 만들어내는 **식신(食神)** — 표현하고, 베풀고, 활동하며 에너지를 밖으로 내보내는 기운입니다. 즉 책임을 떠안으면서(관) 동시에 부지런히 움직여 풀어내는(식신) 흐름이라 할 수 있습니다.\n\n## 🌟 총운 ★★★☆☆\n\n월지 인목과 오늘 오화가 **인오 반합(寅午, 화 기운 결합)**을 이루어 불기운이 한층 강해지고, 시지의 오화와도 겹쳐 활동력·표현력이 크게 올라가는 날입니다. 다만 일지 축토와 오화 사이에 **축오해(丑午害)**가 걸려, 가까운 사람과의 사소한 어긋남이나 마음의 답답함이 생길 수 있습니다. 의욕은 충분하니, 일을 벌이기보다 시작한 것을 매듭짓는 데 힘을 쓰면 좋은 흐름입니다.\n\n## 💰 재물운\n\n정관의 기운이 강한 날이라 충동적 지출보다 **계획과 약속을 지키는 소비**가 잘 맞습니다. 들어올 돈·나갈 돈을 정리해 두면 마음이 한결 가벼워집니다. 화 기운이 왕성해 \"기분 따라 쓰기\" 쉬운 날이니, 큰 결정은 하루 미뤄두는 편이 안전합니다.\n\n## 💼 일·직장운\n\n오늘의 핵심 무대입니다. 정관 합 + 식신의 조합은 **맡은 일을 성실히 표현하고 인정받는** 그림입니다. 보고·발표·소통처럼 드러나는 업무에서 특히 빛이 납니다. 다만 화가 강해 말이 앞서기 쉬우니, 한 박자 늦춰 답하면 신뢰가 더 단단해집니다.\n\n## ❤️ 관계운\n\n축오해의 영향으로 가장 가까운 사람과 미묘한 신경전이 생길 수 있습니다. 식신의 따뜻한 표현력을 활용해 **먼저 챙기고 먼저 풀어주는** 쪽을 택하세요. 작은 호의 하나가 하루의 분위기를 바꿉니다.\n\n## 🏃 건강운\n\n을목 체질은 본래 수분과 시원함을 좋아하는데, 오늘은 불기운이 몰려 **열·건조·눈의 피로·심장 두근거림**이 나타나기 쉽습니다. 물을 자주 마시고, 카페인과 과한 자극은 줄이고, 잠깐씩 눈과 몸을 식혀 주세요. 임수(정인)의 기운을 빌리듯 충분한 휴식이 보약입니다.\n\n## 🍀 오늘의 한 마디\n\n> **\"벌이기보다 매듭짓기. 한 박자 늦춘 말이 신뢰가 됩니다.\"**\n\n행운 시간대: 오전 9~11시(사시) | 행운 색: 검정·짙은 파랑 | 방향: 북쪽\n\n---\n*명리학적 관점의 참고용 해석입니다. 중요한 결정은 언제나 당신의 판단이 우선입니다.*"}, "history": {"updated_at": "06/25 오전", "content": "## 📜 오늘의 역사 한 조각 — 2026-06-24\n\n> # **\"플라잉 소서\"의 탄생 — 케네스 아널드의 UFO 목격** (1947)\n\n## 🕰️ 무슨 일이 있었나\n\n1947년 6월 24일, 미국의 민간 조종사 케네스 아널드(Kenneth Arnold)는 워싱턴주 레이니어산(Mount Rainier) 상공을 비행하던 중 빛나는 물체 9개가 고속으로 이동하는 것을 목격했다. 그는 물체들의 움직임을 \"수면 위를 튀어 나가는 접시 같다(like a saucer skipping across water)\"고 묘사했다. 이 말이 언론에 전달되는 과정에서 \"비행 접시(flying saucer)\"라는 표현이 탄생했고, 당일 저녁 전국 뉴스를 통해 퍼져 나갔다.\n\n## 🌍 배경과 맥락\n\n제2차 세계대전 직후, 미국은 소련과의 냉전이 시작되는 불안한 시기였다. 전쟁 중 로켓·항공 기술이 급격히 발전한 탓에 하늘에서 정체불명의 물체를 목격했다는 신고가 늘어나고 있었다. 아널드의 사건은 언론의 집중 조명을 받았고, 곧 전국에서 유사한 목격담이 쏟아지기 시작했다. 같은 해 7월에는 뉴멕시코 로스웰(Roswell) 추락 사건까지 겹치며 UFO 열풍이 본격화됐다.\n\n## 💡 오늘의 우리에게\n\n아널드의 목격담이 남긴 가장 큰 유산은 '플라잉 소서'라는 단어 자체다. 그가 묘사한 것은 물체의 *모양*이 아니라 *움직임*이었는데, 언론이 이를 잘못 옮기면서 오늘날까지 쓰이는 개념이 만들어졌다. 정보가 전달되는 과정에서 의미가 변형된다는 고전적인 사례이자, 집단적 믿음이 어떻게 형성되는지를 보여 주는 사례이기도 하다.\n\n---\n\n## 💡 나를 발전시키는 지식 한 조각\n\n> # **저자의 죽음 — 텍스트의 의미는 작가가 아니라 독자가 결정한다**\n\n**카테고리:** 문화 · 문학/사상\n\n## 📖 핵심 개념\n\n프랑스 문학비평가 롤랑 바르트(Roland Barthes)는 1967년 에세이 「저자의 죽음(La mort de l'auteur)」에서 충격적인 주장을 내놓았다. 작가의 의도나 생애는 텍스트의 '올바른 해석'을 결정하지 않는다는 것이다. 글이 세상에 나오는 순간 작가는 '죽고', 텍스트는 독자 각자의 경험과 문화적 맥락 속에서 새로운 의미를 얻는다. 따라서 하나의 텍스트에는 단 하나의 정답이 아니라 독자의 수만큼 다양한 해석이 존재한다.\n\n## 🔍 조금 더 깊이\n\n바르트의 주장은 당시 유행하던 '작가 중심 비평'에 정면으로 맞선 것이었다. 예컨대 셰익스피어가 *햄릿*에서 무엇을 말하려 했는지가 해석의 기준이 되어서는 안 된다는 것이다. 이 개념은 미셸 푸코의 「저자란 무엇인가?」(1969)와 맞물려 포스트구조주의 문학이론의 핵심 축이 됐다. 오늘날엔 영화·게임·소셜미디어 콘텐츠를 해석하는 데도 폭넓게 적용된다.\n\n## 🧠 이렇게 써먹자\n\n영화나 소설을 감상할 때 \"감독/작가가 무엇을 의도했을까?\"보다 \"나는 이것에서 무엇을 느끼고 읽어내는가?\"를 먼저 물어보자. 내 해석이 틀린 것이 아니라 하나의 유효한 독해일 수 있다. 반대로 자신이 만든 콘텐츠가 의도와 다르게 받아들여지더라도, 그것 역시 작품의 일부임을 받아들이는 태도가 창작자에게 필요한 유연함이다."}, "goodtext": {"updated_at": "06/25 오전", "content": "## 🌅 오늘의 글귀 — 동기부여\n\n> # **\"헤아릴 수 없이 수많은 세계가 우주에 흩어져 있는데, 오직 이 지구만이 공교롭게 한가운데에 있다는 그런 이치는 없다.\"**\n\n## ✍️ 누가 한 말?\n\n**홍대용 (洪大容, 1731~1783)**\n\n조선 후기의 실학자이자 천문학자입니다. 당시 누구나 당연하게 여기던 \"하늘은 둥글고 땅은 네모지며, 중국이 세상의 중심\"이라는 관념을 정면으로 의심하고, 지구가 둥글며 스스로 돈다는 지전설(地轉說)과 우주가 무한하다는 무한우주론을 펼쳤습니다. '조선의 갈릴레이'로도 불립니다. 이 글귀는 1766년 청나라 사행을 다녀온 뒤 쓴 자연과학 대화편 《의산문답(毉山問答)》에서, 가상의 스승 실옹(實翁)이 제자 허자(虛子)에게 우주의 구조를 설명하는 대목에 나옵니다.\n\n## 🌐 원문\n\n> 滿天星宿, 無非界也. 自星界觀之, 地界亦星也. 無量之界, 散處空界, 惟此地界, 巧居正中, 無有是理.\n>\n> (하늘에 가득한 별들은 모두 하나의 세계 아닌 것이 없다. 별의 세계에서 보면 지구 또한 하나의 별이다. 무수한 세계가 빈 우주에 흩어져 있는데, 오직 이 지구만이 공교롭게 한가운데 있다는 — 그런 이치는 없다.)\n\n## 💭 오늘에 적용하면\n\n\"내가 있는 곳이 세상의 중심\"이라는 생각은 편안하지만, 종종 우리 시야를 좁힙니다. 홍대용은 250여 년 전, 모두가 옳다고 믿던 전제를 \"그런 이치는 없다\"며 다시 물었습니다. 오늘 하루, 당연하게 여겨 한 번도 의심하지 않았던 전제 하나를 골라 \"정말 그럴까?\" 하고 가볍게 되물어 보세요. 내 자리가 유일한 기준이 아님을 인정하는 순간, 오히려 더 넓은 선택지와 새로운 길이 보입니다."}, "thai": {"updated_at": "06/25 오전", "content": "# 🇹🇭 오늘의 태국어 세 문장 (2026-06-25)\n\n## 🟢 초급\n\n> # **ขอบคุณมากค่ะ**\n\n**🔊 발음:** 컵쿤 막 카 (khɔ̀ɔp-khun mâak khâ)\n**🇰🇷 해석:** 정말 감사합니다.\n**🇺🇸 영어:** Thank you very much.\n**📝 문장 설명:** 가장 기본적이면서도 매일 쓰는 감사 표현입니다. มาก(많이)을 붙여 감사의 정도를 강조했습니다. 문장 끝의 ค่ะ는 여성 화자의 정중한 종결어이며, 남성은 ครับ(크랍)을 씁니다.\n\n**📚 단어 풀이**\n\n| 태국어 | 발음 | 뜻 |\n|---|---|---|\n| ขอบคุณ | 컵쿤 | 감사하다 |\n| มาก | 막 | 많이, 매우 |\n| ค่ะ | 카 | (여성) 정중한 종결어 |\n\n---\n\n## 🟡 중급\n\n> # **วันนี้อากาศร้อนมาก ขอน้ำเย็นหน่อยค่ะ**\n\n**🔊 발음:** 완니 아깟 론 막, 커 남 옌 너이 카 (wan-níi aakàat rɔ́ɔn mâak, khɔ̌ɔ náam yen nɔ̀i khâ)\n**🇰🇷 해석:** 오늘 날씨가 너무 더워요, 시원한 물 좀 주세요.\n**🇺🇸 영어:** It's really hot today, may I have some cold water please?\n**📝 문장 설명:** 날씨를 언급한 뒤 요청으로 이어지는, 두 절로 된 실용 문장입니다. ขอ...หน่อย는 \"~을 좀 주세요\"라는 부드러운 요청 표현으로 식당·상점에서 매우 자주 씁니다. หน่อย는 요청을 완곡하고 공손하게 만들어 줍니다.\n\n**📚 단어 풀이**\n\n| 태국어 | 발음 | 뜻 |\n|---|---|---|\n| วันนี้ | 완니 | 오늘 |\n| อากาศ | 아깟 | 날씨, 공기 |\n| ร้อน | 론 | 덥다, 뜨겁다 |\n| ขอ | 커 | ~을 청하다, 주세요 |\n| น้ำเย็น | 남 옌 | 찬물 |\n| หน่อย | 너이 | 조금, (요청을 부드럽게) |\n\n---\n\n## 🔴 고급\n\n> # **ถ้าไม่รบกวนเกินไป ช่วยแนะนำร้านอาหารอร่อยๆ แถวนี้ให้หน่อยได้ไหมคะ**\n\n**🔊 발음:** 타 마이 롭꾸안 끄언빠이, 추어이 내남 란아한 아러이아러이 태우니 하이 너이 다이마이 카\n**🇰🇷 해석:** 너무 폐가 되지 않는다면, 이 근처 맛있는 식당 좀 추천해 주실 수 있을까요?\n**🇺🇸 영어:** If it's not too much trouble, could you recommend a good restaurant around here?\n**📝 문장 설명:** 정중한 완곡어법으로 시작해 부탁으로 이어지는 복합문입니다. ถ้าไม่รบกวนเกินไป(\"폐가 되지 않는다면\")는 부탁 전에 상대를 배려하는 격식 있는 표현입니다. ช่วย...ให้หน่อย와 ได้ไหม를 함께 써서 공손함을 한층 높였고, อร่อยๆ처럼 형용사를 반복하면 \"맛있는 여러 곳\"이라는 뉘앙스를 줍니다.\n\n**📚 단어 풀이**\n\n| 태국어 | 발음 | 뜻 |\n|---|---|---|\n| ถ้า | 타 | 만약 ~라면 |\n| รบกวน | 롭꾸안 | 폐를 끼치다, 방해하다 |\n| เกินไป | 끄언빠이 | 지나치게, 너무 |\n| ช่วย | 추어이 | 돕다, ~해 주다 |\n| แนะนำ | 내남 | 추천하다, 소개하다 |\n| ร้านอาหาร | 란아한 | 식당 |\n| อร่อย | 아러이 | 맛있다 |\n| แถวนี้ | 태우니 | 이 근처 |\n| ได้ไหม | 다이마이 | ~할 수 있나요? |\n\n---\n\n💡 **오늘의 팁:** 태국어 부탁·요청은 끝에 หน่อย(너이)를 붙이면 훨씬 부드러워지고, 정도에 따라 ขอ(주세요) → ช่วย...หน่อย(좀 해 주세요) → ถ้าไม่รบกวน...ได้ไหม(폐가 안 된다면 ~할 수 있을까요)로 공손함을 단계적으로 높일 수 있습니다. 그리고 문장 끝의 ครับ/ค่ะ는 잊지 마세요 — 같은 말도 훨씬 정중하게 들립니다."}, "story": {"updated_at": "06/25 오전", "content": "## 📖 오늘의 단편소설 — 2026-06-25 (목요일)\n\n> # **「유랑견(流浪犬)」** — 사데그 헤다야트 (1942)\n\n**권역/분류:** 이란(기타 세계) · 근대(1900~1950) · 환상/기괴\n**원제/수록:** سگ ولگرد (Sag-e Velgard / The Stray Dog), 단편집 『유랑견』(1942) 수록\n\n> ※ 아래 줄거리에는 **결말(스포일러)**이 포함되어 있습니다.\n\n---\n\n## ✍️ 작가와 작품\n\n사데그 헤다야트(Sadegh Hedayat, 1903~1951)는 이란 현대문학의 아버지로 불리는 작가다. 테헤란의 귀족 가문에서 태어나 프랑스·벨기에에서 공부하다 문학의 길로 들어섰으며, 포, 모파상, 카프카, 체호프의 영향을 깊이 받았다. 그의 대표작 『눈먼 올빼미(Buf-e Kur)』(1937)는 페르시아 문학의 가장 카프카적인 걸작으로 꼽힌다. 「유랑견」은 1942년 동명의 단편집에 실린 작품으로, 헤다야트 최고의 단편이라 평가받는다. 헤다야트는 48세의 나이에 파리에서 스스로 생을 마감했으며, 이 이야기는 그의 깊은 허무주의와 이란 사회에 대한 통렬한 비판의식을 담고 있다.\n\n---\n\n## 📜 줄거리 (결말 포함)\n\n이야기는 이란의 소읍 바레민(Varamin) 광장에서 시작된다. 불볕더위 속에 빵집, 정육점, 약국, 카페, 이발소가 늘어선 먼지투성이 광장은 숨을 죽이고 있다. 광장 한편에는 속이 썩어 텅 빈 고목이 자라고 있고, 탁하고 느린 수로(juy)가 카페 앞을 기어간다. 이 빛바랜 풍경 속에 한 마리 개가 열탑(Varamin Tower) 아래 수로 구멍에 몸을 구겨 넣고 누워 있다. 스코틀랜드 종의 개 '패트(Pat)'다. 검푸른 주둥이, 검은 반점이 박힌 뒷다리, 진흙이 굳은 털—그 어수선한 얼굴에서 유독 빛나는 것은 두 개의 갈색 눈이다. 그 눈 속에는 상처 입은 가젤을 닮은, 인간의 영혼 같은 무언가가 깃들어 있었다. 하지만 그 눈을 알아보는 사람은 이 광장에 아무도 없었다.\n\n패트가 이곳에 오기 전 살았던 삶은 전혀 달랐다. 한때 따뜻한 집과 나무로 된 개집, 그리고 자신을 특별히 여기는 주인이 있었다. 어미의 젖을 배 불리 먹던 기억, 형제 개와 풀밭을 구르며 귀를 깨물던 놀이, 주인의 아들과 정원을 뛰어다니며 옷자락을 물던 시절—이것이 패트에게는 잃어버린 낙원이었다. 주인은 제때 밥을 주고, 설탕 덩어리를 손바닥에 올려 먹이고, \"패트… 패트…\" 하고 이름을 불러주었다.\n\n그 낙원이 사라진 것은 어느 가을날이었다. 주인이 두 지인과 함께 자동차를 타고 바레민으로 향했고, 패트도 함께 실렸다. 패트는 그때 발정기였다—몸속에서 끓어오르는 흥분과 불안을 주체할 수 없었다. 광장에 도착해 차에서 내리자마자 그의 코에 강렬한 냄새가 꽂혔다. 암캐의 냄새. 그 냄새는 이성을 마비시킬 만큼 강렬했다. 패트는 몇 발짝마다 멈춰 땅을 킁킁거리다가, 골목 안 열린 수로를 통해 어떤 정원 안으로 빨려 들어갔다. 해 질 무렵 정원에서 나왔을 때, 어디선가 \"패트… 패트…\" 하는 소리가 들린 것 같았다. 광장으로 돌아왔을 때 주인은 이미 없었다.\n\n패트는 온 마을을 뒤졌다. 골목마다 자신의 냄새를 남기며 주인의 흔적을 찾았다. 주인의 냄새는 다른 수많은 냄새들에 묻혀 사라졌다. 그날 밤부터 패트는 바레민의 유랑견이 되었다.\n\n바레민 사람들에게 개는 종교적으로 불결한 존재였다. 그들은 \"알라를 기쁘게 하기 위해\" 패트를 돌로 치고, 발로 차고, 몽둥이로 때렸다. 빵집 앞의 심부름꾼, 정육점의 도제, 찹쌀떡 장수 소년—모두 패트를 괴롭히는 데서 즐거움을 찾았다. 빵집 주인은 한번은 패트를 부르더니 빵 한 조각을 던져주고 목줄을 풀어주었다. 구속에서 해방된 듯 가벼운 기분도 잠시, 주인은 힘껏 발로 차버리고는 의례적으로 손을 세 번 씻었다. 패트의 목줄은 빵집 처마에 전리품처럼 걸렸다. 이 낯선 세계에서 그나마 살아남는 법을 패트는 2년에 걸쳐 천천히 배웠다—쓰레기더미에서 음식을 뒤지는 법, 뼈다귀와 생선 머리를 걸레처럼 삼키는 법, 매질을 당하면 낑낑거리며 도망치는 법. 예전의 용감하고 생기 넘치던 개는 사라지고, 작은 소리에도 몸을 웅크리는 겁쟁이가 남았다.\n\n그러나 패트를 가장 깊이 갉아먹는 것은 신체의 고통이 아니었다. 그것은 사랑의 결핍이었다. 그의 눈은 항상 애원하고 있었다—제발 한 번만 쓰다듬어 달라고, 내 눈을 봐 달라고. 누군가를 위해 모든 것을 바칠 준비가 되어 있었다. 그러나 이 마을의 어떤 눈에서도 그는 적의와 증오 외에 아무것도 보지 못했다.\n\n어느 낮, 자동차 한 대가 광장으로 들어서더니 낯선 남자가 내렸다. 남자는 패트에게 다가와 아무 이유 없이 머리를 쓰다듬었다. 그 손길이 너무 생소해서 패트는 잠시 얼어붙었다. 남자는 카페에 들어가 자리를 잡았고, 빵을 요구르트에 찍어 패트에게 건넸다. 패트는 처음에는 허겁지겁, 나중에는 천천히 먹었다. 오랜만의 포식이었다. 고마움과 무력함이 뒤섞인 채, 그는 갈색 눈을 들어 남자의 얼굴을 바라보았다. 새 주인이 생긴 것일까? 남자가 마을 골목들을 거닐 때 패트는 그 뒤를 따랐다. 남자가 차에 오르려 할 때 패트는 차 옆에 앉아 그를 지켜보았다. 차에 타고 싶었지만 감히 올라설 수가 없었다.\n\n자동차가 먼지를 일으키며 출발했다. 패트는 망설임 없이 뛰었다. 이번에는 놓치지 않겠다고, 결코 놓치지 않겠다고 다짐하면서. 온몸의 고통을 무릅쓰고 전력으로 달렸다. 마을을 벗어나 들판을 지나는 동안 두세 번 차를 따라잡았다가 다시 뒤처지기를 반복했다. 그러나 2년간의 굶주림과 매질로 망가진 몸이 자동차의 속도를 이길 수는 없었다. 현기증이 밀려오고 다리가 명령을 거부했다. 패트는 멈춰 설 수밖에 없었다. 혀를 늘어뜨리고 헐떡이며, 시야가 서서히 어두워지는 가운데, 간신히 도로 옆 수로 속으로 몸을 끌고 들어가 뜨겁고 축축한 모래 위에 몸을 뉘었다. 그의 본능이 속삭였다—이 자리를 다시는 떠나지 못할 것이라고. 배에 격렬한 통증이 일었고, 눈에는 병적인 빛이 흘렀다. 사지가 점점 굳어갔고, 차가운 땀이 온몸을 감쌌다.\n\n해 질 무렵, 세 마리의 굶주린 까마귀가 패트의 머리 위를 맴돌기 시작했다. 그들은 냄새로 그를 찾아냈다. 한 마리가 조심스럽게 내려앉아 패트가 아직 완전히 숨이 끊어지지 않았음을 확인하고는 다시 날아올랐다. 세 마리의 까마귀는 기다렸다. 패트의 두 갈색 눈—상처 입은 가젤의 눈을 닮은, 인간의 영혼이 깃든 그 두 눈—을 쪼아내기 위해.\n\n---\n\n## 💡 감상 포인트\n\n「유랑견」은 개의 시선을 통해 이란 사회의 종교적 편견과 잔인성을 고발하는 강렬한 사회비판적 작품이다. 패트가 기억하는 스코틀랜드의 낙원과 바레민의 지옥은 문명과 야만, 과거와 현재의 극단적 대비를 이루며, 헤다야트 특유의 허무주의적 세계관을 드러낸다. 요구르트와 어미 젖의 연결, 세 마리 까마귀가 눈을 노리는 마지막 장면은 인간의 가장 아름다운 것(눈, 영혼, 사랑)이 결국 잔혹하게 소멸된다는 그로테스크한 상징으로 읽힌다. 주인을 '신(神)'으로 여기는 패트의 절대적 충성심과 그 신에게 버림받는 서사는, 인간이 믿었던 신과 이상에 배신당하는 인간 존재의 알레고리로도 해석된다."}};
const TASKS=[
  {key:"portfolio",emoji:"📈",label:"포트폴리오"},
  {key:"stock",emoji:"📰",label:"주식뉴스"},
  {key:"fortune",emoji:"🔮",label:"운세"},
  {key:"history",emoji:"📜",label:"역사"},
  {key:"goodtext",emoji:"✨",label:"글귀"},
  {key:"thai",emoji:"🇹🇭",label:"태국어"},
  {key:"story",emoji:"📚",label:"단편소설"}
];

let active=TASKS[0].key;

function today(){
  const d=new Date(),days=["일","월","화","수","목","금","토"];
  return d.getFullYear()+"년 "+(d.getMonth()+1)+"월 "+d.getDate()+"일 ("+days[d.getDay()]+")";
}

function md(t){
  return t
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^---+$/gm,"<hr>")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,"<code>$1</code>");
}

function render(){
  document.getElementById("tabs").innerHTML=TASKS.map(t=>{
    const d=DATA[t.key];
    return "<div class=\"tab "+(t.key===active?"active":"")+" \" data-key=\""+t.key+"\">"+
      "<span class=\"badge "+(d?"ok":"")+"\" ></span>"+t.emoji+" "+t.label+"</div>";
  }).join("");
  document.querySelectorAll(".tab").forEach(el=>{
    el.addEventListener("click",()=>switchTab(el.dataset.key));
  });
  document.getElementById("panels").innerHTML=TASKS.map(t=>{
    const d=DATA[t.key];
    const inner=d
      ?"<div class=\"card\"><div class=\"card-head\"><div class=\"card-emoji\">"+t.emoji+"</div>"+
        "<div><div class=\"card-title\">"+t.label+"</div>"+
        "<div class=\"card-time\">업데이트: "+d.updated_at+"</div></div></div>"+
        "<div class=\"card-body\">"+md(d.content)+"</div></div>"
      :"<div class=\"empty\">⏳ 아직 생성되지 않았어요</div>";
    return "<div class=\"panel "+(t.key===active?"active":"")+" \" id=\"panel-"+t.key+"\">"+inner+"</div>";
  }).join("");
}

function switchTab(key){
  active=key;
  document.querySelectorAll(".tab").forEach(el=>el.classList.toggle("active",el.dataset.key===key));
  document.querySelectorAll(".panel").forEach(el=>el.classList.toggle("active",el.id==="panel-"+key));
}

document.getElementById("hdate").textContent=today();
document.getElementById("status").textContent="업데이트: 2026-06-25 오전";
render();

</script>
